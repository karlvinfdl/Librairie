# Messenger Configuration (BASE - commun à tous les environnements)
# https://symfony.com/doc/current/messenger.html

framework:
    messenger:
        # Transport used when a message fails permanently
        failure_transport: failed

        # Define your transports
        transports:
            # Sync transport (envoi immédiat, pas de queue)
            sync: "sync://"

            # Async transport using Doctrine (database queue)
            async:
                dsn: "%env(MESSENGER_TRANSPORT_DSN)%"
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
                    delay: 1000

            # Failed messages transport (Doctrine)
            failed: "doctrine://default?queue_name=failed"

        # Default message bus
        default_bus: messenger.bus.default

        # Define your buses
        buses:
            messenger.bus.default: []

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
